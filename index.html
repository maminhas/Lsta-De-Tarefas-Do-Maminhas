<!DOCTYPE html>
<html>
    <head>
        <title>Lista De Tarefas Do Maminhas</title>
    </head>
    <body>

    <h1>Lista De Tarefas</h1>
    <ul></ul>
    <input>
    <button onclick="add()">enviar</button>

    <script>

        const tarefas = ['Estudar HTML','Estudar CSS','Estudar JS']

        function add() {
            const input = document.querySelector("input")
            const tarefa = input.value
            tarefas.push(tarefa)
            input.value = ""
            render()
        }

        function render() {
            const ul = document.querySelector("ul")
            ul.innerHTML = ""

            tarefas.forEach(function (tarefa) {
                const li = document.createElement("li")
                li.innerText = tarefa
                ul.appendChild(li)
            })
        }

        render()

    </script>
</body>
</html>
