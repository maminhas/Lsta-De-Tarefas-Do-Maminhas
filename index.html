<!DOCTYPE html>
<html>
    <head>
        <title>Lista De Tarefas Do Maminhas</title>
    </head>
    <body>

    <h1>Lista De Tarefas</h1>
    <ul>
        <li>Estudar HTML</li>
        <li>Estudar CSS</li>
        <li>Estudar JS</li>
    </ul>
    <input>
    <button onclick="add()">enviar</button>

    <script>

        function add() {
            const ul = document.querySelector("ul")
            const input = document.querySelector("input")
            const tarefa = input.value
            
            const li = document.createElement("li")
            li.innerText = tarefa
            ul.appendChild(li)

            input.value = ""
        }

    </script>
    
    </body>
</html>
